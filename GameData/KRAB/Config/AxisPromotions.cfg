// Fields promoted from plain [KSPField] to axis-bindable fields at runtime by
// KRAB's AxisPromoter (see src/AxisPromoter.cs). Promoted fields show up in the
// Axis Groups menu and become valid KAL/KRAB targets.
//
// Extensible via ModuleManager from any mod:
//   module           = PartModule class name (subclasses are matched too)
//   field            = float field name; must be a plain [KSPField]
//   minValue         = axis minimum (default 0)
//   maxValue         = axis maximum (default 100)
//   incrementalSpeed = increment rate in incremental mode (default 20, stock slider feel)
//   axisMode         = Incremental | Absolute (default Incremental, like stock sliders)
KRAB_AXIS_PROMOTION
{
	PROMOTE
	{
		module = ModuleRCS // also covers ModuleRCSFX (subclass)
		field = thrustPercentage
		minValue = 0
		maxValue = 100
	}
	PROMOTE
	{
		module = ModuleReactionWheel
		field = authorityLimiter
		minValue = 0
		maxValue = 100
	}
}
