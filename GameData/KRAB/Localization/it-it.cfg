		// PAW/Action-Group-editor label for KRAB input slot 2.
		#LOC_KRAB_input2 = Ingresso KRAB 2
		// PAW/Action-Group-editor label for KRAB input slot 3.
		#LOC_KRAB_input3 = Ingresso KRAB 3
		// PAW/Action-Group-editor label for KRAB input slot 4.
