		// Screen message after a successful debug trigger bind. <<1>> = the part's name.
		#LOC_KRAB_debugBindLightDone = Inneschi KRAB collegati a <<1>>
		// Screen message when the debug trigger bind can't find anything to bind.
		#LOC_KRAB_debugBindLightFail = Nessun Innesco Azione nel grafo o nessuna luce su questo veicolo
	}
}
