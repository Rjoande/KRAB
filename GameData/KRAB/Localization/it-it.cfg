		#LOC_KRAB_node_WeightedSum = Somma Pesata
		// Combinator: multiplies all of its inputs together.
		#LOC_KRAB_node_Product = Prodotto
		// Combinator: the smaller of its two inputs.
		#LOC_KRAB_node_Min = Min
		// Combinator: the larger of its two inputs.
		#LOC_KRAB_node_Max = Max
		// Filter: linearly (or via a custom curve, M4) maps an input range to an output range.
		#LOC_KRAB_node_Remap = Rimappa
		// Filter: crossfades between two inputs driven by a third control signal.
		#LOC_KRAB_node_GatedBlend = Combina Condizionato
		// Filter: rate of change of its input over time.
		#LOC_KRAB_node_Derivative = Derivata
		// Filter: limits how fast its output can change per second.
		#LOC_KRAB_node_SlewRate = Limite di Variazione
		// Filter: outputs 1/0 based on a threshold, with optional hysteresis.
		#LOC_KRAB_node_Comparator = Comparatore
		// Filter: sample-and-hold (track or latch modes) gated by a second input.
		#LOC_KRAB_node_Hold = Mantieni
		// Logic gate: true only if every input is true.
		#LOC_KRAB_node_And = Tutti (AND)
		// Logic gate: true if any input is true.
		#LOC_KRAB_node_Or = Almeno uno (OR)
		// Logic gate: inverts its single input.
		#LOC_KRAB_node_Not = Non
