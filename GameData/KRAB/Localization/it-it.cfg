		// Node display names
		// Friendly name of a node subtype, shown throughout the editor (tree rows, tab titles, curve window title, etc.).

		// A fixed numeric value.
		#LOC_KRAB_node_Constant = Costante
		// One of the controller's 4 assignable input slots (Action-Group-driven).
		#LOC_KRAB_node_ControllerInput = Ingresso KRAB
		// Raw player stick input, before autopilot/SAS.
		#LOC_KRAB_node_PlayerAxis = Asse Giocatore
		// The vessel's actual control state after autopilot/SAS has fed in.
