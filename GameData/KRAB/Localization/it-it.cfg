// KRAB-9000 localization — Italian.
// Comments stay in English (project convention: code/cfg comments are
// English, player-facing values are localized) and mirror en-us.cfg exactly,
// key for key, so the two files stay easy to diff against each other.
Localization
{
	it-it
	{
		// Part

		// Part list entry name (VAB/SPH parts panel and part tooltip title).
		#LOC_KRAB_partTitle = Controller KRAB-9000
		// Part tooltip description, shown when hovering the part in the parts panel.
		#LOC_KRAB_partDescription = Dove il KAL-1000 riproduce una sequenza scritta a mano, il KRAB-9000 ascolta. Dagli in pasto input dello stick, comandi dell'autopilota o dati di volo grezzi: li mescolerà tutti — attraverso un grafo a nodi allarmantemente flessibile — in qualunque cosa i tuoi servi, motori e superfici di controllo dovrebbero fare in questo preciso istante. Il Moving Parts Experts Group insiste che i rumori di pinzatura simili a quelli di un granchio siano puramente casuali.
		// Search keywords for the parts panel filter box — never shown as a sentence.
		#LOC_KRAB_partTags = controllo controller robot mix combina grafo nodo asse ingresso krab

		// Module (PAW)

		// Header of the module's block in the part's tooltip (right side of the parts panel).
		#LOC_KRAB_moduleName = Controller KRAB
		// Body text of the module's block in the part's tooltip.
		#LOC_KRAB_moduleInfo = Combina più ingressi — assi del giocatore, uscita dell'autopilota e fisica del veicolo — attraverso un grafo a nodi, e pilota gli assi delle parti proprio come un controller KAL.
