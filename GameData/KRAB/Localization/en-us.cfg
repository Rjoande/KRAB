		// Part tooltip description, shown when hovering the part in the parts panel.
		#LOC_KRAB_partDescription = Where the KAL-1000 plays back a hand-crafted sequence, the KRAB-9000 listens. Feed it stick inputs, autopilot commands or raw flight data and it will blend them all, through an alarmingly flexible node graph, into whatever your servos, engines and control surfaces should be doing right now. The Moving Parts Experts Group insists the crab-like pinching noises are purely coincidental.
		// Search keywords for the parts panel filter box — never shown as a sentence.
		#LOC_KRAB_partTags = control controller robot mix blend graph node axis input krab

