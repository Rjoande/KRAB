// KRAB-9000 localization — English (development master).
// All player-visible strings live here; other languages will be added once
// development settles.
//
// Comment convention (added 2026-07-17, for future translators): each key has
// a one-line comment directly above it saying WHERE it appears in the UI and,
// for keys with <<1>>/<<2>> placeholders, what they are substituted with.
// ModuleManager/KSP ignore these comments; they exist only for humans editing
// this file by hand.
