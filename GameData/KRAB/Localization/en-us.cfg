		// Validation messages — the editor's validation strip (bottom of the tree
		// area), one line per issue found in the graph (KrabGraph.Validate). Most of
		// these need a hand-edited save file to trigger; a few (tooFewInputs,
		// portUnconnected, noActiveOutput, nodeOrphan) can show up from normal
		// editing. The <<n>> placeholders are always node ids, subtype names, port
		// numbers or counts — never full sentences, so word order stays safe to
		// rearrange per language.

		// A NODE entry has no id and can never be linked to. <<1>> = its subtype name.
		#LOC_KRAB_issue_nodeMissingId = A node has no id (subtype '<<1>>') and can't be linked to
		// Two NODE entries share the same id; links resolve to the first one. <<1>> = the duplicated id.
		#LOC_KRAB_issue_nodeDuplicateId = Duplicate node id '<<1>>' — links resolve to the first one found
		// A node's declared type doesn't match its subtype's real kind (e.g. a SOURCE entry naming an OPERATOR subtype) — disabled, not dropped. <<1>> = node id, <<2>> = subtype name, <<3>> = the subtype's real kind, <<4>> = the declared (wrong) type.
		#LOC_KRAB_issue_nodeWrongKind = Node '<<1>>' disabled: subtype '<<2>>' belongs to a different kind (<<3>>), not '<<4>>'
		// A node's subtype isn't recognized at all (likely written by a newer mod version) — disabled, not dropped. <<1>> = node id, <<2>> = the unrecognized subtype name.
		#LOC_KRAB_issue_nodeUnknownSubtype = Node '<<1>>' disabled: unknown subtype '<<2>>' (from a newer mod version?)
		// A LINK's "from" or "to" node id doesn't exist in the graph. <<1>> = the link, shown as "fromId -> toId:port".
		#LOC_KRAB_issue_linkDangling = A link (<<1>>) references a node that doesn't exist
		// A LINK originates from an Output node, which has no output port to link out of. <<1>> = the link.
		#LOC_KRAB_issue_linkFromOutput = A link (<<1>>) starts from an output, which has nothing to link out of
		// A LINK targets a Source node, which has no input ports. <<1>> = the link.
		#LOC_KRAB_issue_linkIntoSource = A link (<<1>>) targets a source, which has no input ports
		// A LINK's target port number is negative. <<1>> = the link.
		#LOC_KRAB_issue_linkBadPort = A link (<<1>>) has an invalid port number
		// Two different LINK entries both target the same node+port. <<1>> = node id, <<2>> = port number.
		#LOC_KRAB_issue_portMultipleLinks = Node '<<1>>' port <<2>> has more than one incoming link
		// A DEFAULT entry's node id doesn't exist in the graph. <<1>> = that node id.
		#LOC_KRAB_issue_defaultDangling = A default value refers to a node that doesn't exist ('<<1>>')
		// A port has both a real link and a DEFAULT entry; the DEFAULT is ignored (not an error, just redundant). <<1>> = node id, <<2>> = port number.
		#LOC_KRAB_issue_defaultShadowed = Node '<<1>>' port <<2>> has both a link and a default value — the default is ignored
		// Two different DEFAULT entries both target the same node+port. <<1>> = node id, <<2>> = port number.
		#LOC_KRAB_issue_defaultDuplicate = Node '<<1>>' port <<2>> has more than one default value
		// A dynamic-arity node (Weighted Sum, And, Or, ...) has fewer terms than its minimum. Reachable by removing terms down past the minimum. <<1>> = node id, <<2>> = subtype name, <<3>> = how many terms it currently has, <<4>> = the minimum required.
		#LOC_KRAB_issue_tooFewInputs = Node '<<1>>' (<<2>>) has <<3>> input(s), needs at least <<4>>
		// A required input port has neither a link nor a default value. <<1>> = node id, <<2>> = subtype name, <<3>> = port number.
		#LOC_KRAB_issue_portUnconnected = Node '<<1>>' (<<2>>) port <<3>> is not connected to anything
		// No Output node in the graph has its port 0 covered — the graph is built but drives nothing. No placeholders.
		#LOC_KRAB_issue_noActiveOutput = No output is connected — this graph doesn't drive anything yet
		// A node exists but isn't reachable from any output (harmless, just flagged for the player's awareness). <<1>> = node id, <<2>> = subtype name.
		#LOC_KRAB_issue_nodeOrphan = Node '<<1>>' (<<2>>) doesn't feed any output
		// The graph's wiring loops back on itself. <<1>> = the cycle, shown as a chain of node ids ("n3 -> n4 -> n3").
		#LOC_KRAB_issue_graphCycle = Cycle detected: <<1>>

		// Graph status (PAW)

		// PAW field label for the graph's compile-status readout.
		#LOC_KRAB_graphStatus = KRAB Graph
		// Status value shown when the controller has no graph yet.
		#LOC_KRAB_statusNone = none
		// Status value shown when the graph compiled with no errors. <<1>> = number of nodes.
		#LOC_KRAB_statusOk = <<1>> node(s), valid
		// Status value shown when the graph has validation errors (details go to the log, not this line). <<1>> = number of errors.
		#LOC_KRAB_statusErrors = invalid: <<1>> error(s), see log

		// Development aids (visible only with debugMode = true in the part cfg)

		// PAW event that runs the in-code graph self-test and prints PASS/FAIL to the screen.
		#LOC_KRAB_selfTest = KRAB: run graph self-test
		// Screen message after the self-test succeeds.
		#LOC_KRAB_selfTestPass = KRAB graph self-test: PASS
		// Screen message after the self-test fails (details go to KSP.log).
		#LOC_KRAB_selfTestFail = KRAB graph self-test: FAIL (see KSP.log)
		// PAW debug field showing the first AxisOutput's live value.
		#LOC_KRAB_debugOutput = KRAB Out[0]
		// PAW event that wires the graph's first AxisOutput to the vessel's first servo axis, for quick end-to-end testing.
		#LOC_KRAB_debugBind = KRAB: bind output to first servo
		// Screen message after a successful debug bind. <<1>> = the part's name, <<2>> = the axis field's name.
		#LOC_KRAB_debugBindDone = KRAB output bound to <<1>> (<<2>>)
		// Screen message when the debug bind can't find anything to bind.
		#LOC_KRAB_debugBindFail = No AxisOutput in graph or no servo axis on this vessel
		// PAW event that wires the graph's ActionTriggers to the vessel's first light, for quick end-to-end testing.
		#LOC_KRAB_debugBindLight = KRAB: bind triggers to first light
		// Screen message after a successful debug trigger bind. <<1>> = the part's name.
		#LOC_KRAB_debugBindLightDone = KRAB triggers bound to <<1>>
		// Screen message when the debug trigger bind can't find anything to bind.
		#LOC_KRAB_debugBindLightFail = No ActionTrigger in graph or no light on this vessel
	}
}
